    .form-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:var(--shadow); }
    .form-meta { display:grid; grid-template-columns:1fr 1fr 148px 168px; gap:14px; margin-bottom:22px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.08em; }
    .field input,.field select,.field textarea { background:var(--bg); border:1.5px solid var(--border); color:var(--text); font-family:var(--font); font-size:13px; padding:9px 12px; border-radius:var(--radius-sm); outline:none; width:100%; transition:border-color 0.18s,box-shadow 0.18s; }
    .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent3); box-shadow:0 0 0 3px rgba(74,148,112,0.12); }

    .section-divider { display:flex; align-items:center; gap:12px; margin:20px 0 16px; }

    .checklist-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 32px; margin-bottom:20px; }

    .checklist-items { display:flex; flex-direction:column; gap:3px; }

    .check-box { width:17px; height:17px; flex-shrink:0; border:1.5px solid var(--border2); border-radius:5px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; background:#fff; }

    .btn-clear { background:transparent; border:1px solid var(--border); color:var(--text2); font-family:var(--font); font-size:13px; padding:10px 20px; border-radius:var(--radius-sm); cursor:pointer; transition:all 0.18s; }

    .history-card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:15px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all 0.18s; box-shadow:var(--shadow); }

    .fill-ok { background:var(--green); } .fill-partial { background:var(--amber); }

    .btn-modal-image:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

    .pf-meta-item span { font-size:13px; color:var(--text); font-weight:600; }
    .pf-progress-row { display:flex; align-items:center; gap:12px; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:24px; }
    .pf-progress-bar { flex:1; height:8px; background:var(--bg4); border-radius:99px; overflow:hidden; }

    .pf-progress-txt { font-family:var(--mono); font-size:13px; font-weight:700; white-space:nowrap; }

    .pf-item:last-child { border-bottom:none; }
    .pf-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .pf-obs { margin-top:20px; background:var(--amber-lt); border:1px solid rgba(196,122,26,0.2); border-radius:8px; padding:12px 14px; font-size:12px; color:var(--text2); }
    .pf-obs strong { color:var(--amber); font-weight:700; display:block; margin-bottom:4px; font-size:10px; text-transform:uppercase; letter-spacing:0.07em; }
    .pf-footer { margin-top:24px; padding-top:16px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .pf-footer span { font-size:10px; color:var(--text3); }
    .pf-status-badge { font-size:11px; font-weight:700; padding:4px 12px; border-radius:99px; letter-spacing:0.05em; text-transform:uppercase; }
    .pf-ok { background:var(--green-lt); color:var(--green); }
    .pf-partial { background:var(--amber-lt); color:var(--amber); }

    /* TOAST */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--text); color:#fff; font-size:13px; font-weight:500; padding:11px 22px; border-radius:99px; z-index:400; animation:toast-in 0.25s ease; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
    .toast.hidden { display:none; }
    .toast.success { background:var(--green); }
    .toast.error { background:var(--red); }
    @keyframes toast-in { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

    @media (max-width:640px) {
      .form-meta { grid-template-columns:1fr 1fr; }
      .checklist-grid { grid-template-columns:1fr; }
      .history-stats { grid-template-columns:1fr 1fr; }

      .form-actions { flex-direction:column; }
      .form-actions-right { width:100%; flex-direction:column; }
      .history-right { flex-wrap:wrap; justify-content:flex-end; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->

<!-- APP -->
<div id="app-page">
  <header>

        </div>

  <main>

    <!-- HISTORY -->

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">

    <div class="modal-header"><h3 id="modal-title"></h3><button onclick="closeModal()" class="modal-close">✕</button></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAWyvmJRevkAV2Eux2dSYGP5hFq-iYuXd4",
  authDomain: "checklist-87b39.firebaseapp.com",
  projectId: "checklist-87b39",
  storageBucket: "checklist-87b39.firebasestorage.app",
  messagingSenderId: "583742070100",
  appId: "1:583742070100:web:74653e2ea6e08008673cc1"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();
const COL       = "checklist_registros";
const COL_AUDIT = "checklist_auditoria";

// helpers compat → mesma API que antes
const collection  = (d, c)       => d.collection(c);
const addDoc      = (ref, data)   => ref.add(data);
const getDocs     = (ref)         => ref.get();
const doc         = (d, c, id)    => d.collection(c).doc(id);
const deleteDoc   = (ref)         => ref.delete();
const updateDoc   = (ref, data)   => ref.update(data);
const query       = (ref, ...ops) => ops.reduce((r, op) => op(r), ref);
const orderBy     = (f, d="asc")  => r => r.orderBy(f, d);
const limit       = (n)           => r => r.limit(n);

// ── AUTH ──────────────────────────────────────────────────────────
const DISPLAY_NAMES = {
  "admin@portovale.com":    "Administrador",
  "rh@portovale.com":       "RH",
  "gerencia@portovale.com": "Gerência"
};
let currentUser = null;

function setLoginLoading(on) {
  document.getElementById("btn-login").disabled = on;
  document.getElementById("login-loading").style.display = on ? "flex" : "none";
}

window.doLogin = async function() {
  const raw  = document.getElementById("login-user").value.trim();
  const pass = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-error");
  errEl.classList.remove("show");
  if (!raw || !pass) { errEl.textContent = "Preencha usuário e senha."; errEl.classList.add("show"); return; }
  const email = raw.includes("@") ? raw : raw + "@portovale.com";
  setLoginLoading(true);
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    setLoginLoading(false);
    errEl.textContent = "Usuário ou senha incorretos.";
    errEl.classList.add("show");
  }
};

window.doLogout = async function() {
  if (currentUser) audit("LOGOUT", `Usuário ${currentUser.displayName} saiu`);
  await auth.signOut();
};

auth.onAuthStateChanged(user => {
  if (user) {
    const name = DISPLAY_NAMES[user.email] || user.displayName || user.email;
    currentUser = { displayName: name, email: user.email };
    setLoginLoading(false);
    document.getElementById("login-error").classList.remove("show");
    document.getElementById("login-page").style.display = "none";
    document.getElementById("app-page").classList.add("show");
    document.getElementById("user-name-chip").textContent = name;
    document.getElementById("user-avatar").textContent = name.charAt(0).toUpperCase();
    initFirebaseStatus();
    audit("LOGIN", `Usuário ${name} entrou no sistema`);
  } else {
    currentUser = null;
    document.getElementById("app-page").classList.remove("show");
    document.getElementById("login-page").style.display = "flex";
    document.getElementById("login-user").value = "";
    document.getElementById("login-pass").value = "";
  }
});

async function initFirebaseStatus() {
  const badge = document.getElementById("fb-status-badge");
  badge.style.display = "flex";
  try {
    await getDocs(query(collection(db, COL), limit(1)));
    badge.className = "fb-status ok";
    badge.innerHTML = '<div class="fb-dot"></div>Firebase';
  } catch {
    badge.className = "fb-status err";
    badge.innerHTML = '<div class="fb-dot"></div>Offline';
  }
}

// ── AUDITORIA ─────────────────────────────────────────────────────
async function audit(acao, detalhe, registro_id) {
  try {
    const entry = { data_hora: new Date().toISOString(), usuario: currentUser ? currentUser.displayName : "Sistema", acao, detalhe };
    if (registro_id) entry.registro_id = registro_id;
    await addDoc(collection(db, COL_AUDIT), entry);
  } catch(e) { /* silencioso */ }
}

// ── INIT ──────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  ["login-user","login-pass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") window.doLogin(); });
  });
  document.getElementById("data").value = new Date().toISOString().split("T")[0];
  renderChecklist(); updateProgress();
});

// ── TABS ──────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.getElementById("tab-form").classList.toggle("active", tab === "form");
  document.getElementById("tab-history").classList.toggle("active", tab === "history");
  document.getElementById("page-form").classList.toggle("hidden", tab !== "form");
  document.getElementById("page-history").classList.toggle("hidden", tab !== "history");
  if (tab === "history") renderHistory();
};

// ── ACESSOS ───────────────────────────────────────────────────────
const ACESSOS = {
  gerente: [
    { secao:"Grupos", itens:["Grupo Comunicados","Grupo Porto Vale","Grupo Pendências","Grupo NPS","Grupo Gerentes","Grupo Sistema – Clauser"] },
    { secao:"Sistemas e Acessos", itens:["Inadimplentes","Ololu","Click Play","Acesso NPS","Acesso ao Sys Control","Portal","Power BI","Corretor Online","Blip"] }
  ],
  vendedor: [
    { secao:"Grupos", itens:["Grupo Comunicados","Grupo Porto Vale"] },
    { secao:"Sistemas e Acessos", itens:["Ololu","COL","Portal","Blip"] }
  ]
};
let currentType = "gerente";
let checkedItems = {};
let cachedHistory = [];

window.selectType = function(type) {
  currentType = type; checkedItems = {};
  document.getElementById("btn-gerente").classList.toggle("active", type === "gerente");
  document.getElementById("btn-vendedor").classList.toggle("active", type === "vendedor");
  renderChecklist(); updateProgress();
};

function renderChecklist() {
  const area = document.getElementById("checklist-area");
  area.innerHTML = "";
  ACESSOS[currentType].forEach(({ secao, itens }) => {
    const sec = document.createElement("div"); sec.className = "checklist-section";
    const h4 = document.createElement("h4"); h4.textContent = secao; sec.appendChild(h4);
    const div = document.createElement("div"); div.className = "checklist-items";
    itens.forEach(item => {
      const key = currentType + "__" + item;
      const el = document.createElement("div");
      el.className = "check-item" + (checkedItems[key] ? " checked" : "");
      el.onclick = () => toggleItem(key, el);
      el.innerHTML = `<div class="check-box"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"/></svg></div><span class="check-label">${item}</span>`;
      div.appendChild(el);
    });
    sec.appendChild(div); area.appendChild(sec);
  });
}

function toggleItem(key, el) {
  checkedItems[key] = !checkedItems[key];
  el.classList.toggle("checked", checkedItems[key]);
  updateProgress();
}

function updateProgress() {
  const total = ACESSOS[currentType].reduce((a,s) => a + s.itens.length, 0);
  const done = Object.values(checkedItems).filter(Boolean).length;
  const pct = total === 0 ? 0 : Math.round((done/total)*100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = done + " / " + total;
  document.getElementById("progress-pct").textContent = pct + "%";
}

window.clearForm = function() {
  checkedItems = {};
  editingRecordId = null;
  document.getElementById("editing-banner").classList.remove("show");
  const btnSave = document.getElementById("btn-save");
  btnSave.style.background = "";
  btnSave.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Salvar registro`;
  ["nome","obs"].forEach(id => { const el = document.getElementById(id); if(el) el.value = ""; });
  document.getElementById("responsavel").value = "";
  document.getElementById("data").value = new Date().toISOString().split("T")[0];
  document.getElementById("motivo").value = "";
  renderChecklist(); updateProgress();
};

// ── SAVE / UPDATE ─────────────────────────────────────────────────
window.saveRecord = async function() {
  const nome = document.getElementById("nome").value.trim();
  const data = document.getElementById("data").value;
  if (!nome) { showToast("Informe o nome do colaborador.", "error"); return; }
  if (!data)  { showToast("Informe a data.", "error"); return; }
  const total = ACESSOS[currentType].reduce((a,s) => a + s.itens.length, 0);
  const done  = Object.values(checkedItems).filter(Boolean).length;
  const itens = {};
  ACESSOS[currentType].forEach(({ itens: its }) => {
    its.forEach(item => { itens[item] = !!checkedItems[currentType + "__" + item]; });
  });
  const responsavel = document.getElementById("responsavel").value;
  const btn = document.getElementById("btn-save");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:#fff;width:13px;height:13px"></span> Salvando...`;
  try {
    if (editingRecordId) {
      // ── ATUALIZAR registro existente ──
      const oldRecord = cachedHistory.find(x => x.id === editingRecordId);
      const oldDone = oldRecord?.done ?? 0;
      const updates = {
        tipo: currentType, nome, responsavel, data,
        motivo: document.getElementById("motivo").value,
        obs: document.getElementById("obs").value.trim(),
        totalItens: total, done, itens,
        atualizado_em: new Date().toISOString(),
        atualizado_por: currentUser?.displayName ?? "—"
      };
      await updateDoc(doc(db, COL, editingRecordId), updates);
      // Log de auditoria detalhado
      const novosItens = Object.entries(itens)
        .filter(([k,v]) => v && !oldRecord?.itens?.[k])
        .map(([k]) => k);
      const removidosItens = Object.entries(itens)
        .filter(([k,v]) => !v && oldRecord?.itens?.[k])
        .map(([k]) => k);
      let detalhe = `Editado por ${responsavel||currentUser?.displayName} | ${done}/${total} itens (era ${oldDone}/${total})`;
      if (novosItens.length) detalhe += ` | ✓ Marcados: ${novosItens.join(", ")}`;
      if (removidosItens.length) detalhe += ` | ✗ Desmarcados: ${removidosItens.join(", ")}`;
      await addDoc(collection(db, COL_AUDIT), {
        data_hora: new Date().toISOString(),
        usuario: currentUser?.displayName ?? "—",
        acao: "EDITAR",
        detalhe,
        registro_id: editingRecordId
      });
      showToast("Registro atualizado ✓", "success");
      window.cancelEdit();
    } else {
      // ── NOVO registro ──
      const record = {
        tipo: currentType, nome, responsavel, data,
        motivo: document.getElementById("motivo").value,
        obs: document.getElementById("obs").value.trim(),
        totalItens: total, done, itens,
        salvo_em: new Date().toISOString(),
        salvo_por: currentUser?.displayName ?? "—"
      };
      const docRef = await addDoc(collection(db, COL), record);
      await addDoc(collection(db, COL_AUDIT), {
        data_hora: new Date().toISOString(),
        usuario: currentUser?.displayName ?? "—",
        acao: "SALVAR",
        detalhe: `Colaborador: ${nome} | Tipo: ${currentType} | ${done}/${total} itens | Por: ${responsavel}`,
        registro_id: docRef.id
      });
      showToast("Registro salvo no Firebase ✓", "success");
      window.clearForm();
    }
  } catch(e) {
    showToast("Erro ao salvar: " + e.message, "error");
  } finally {
    btn.disabled = false;
    if (!editingRecordId) {
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Salvar registro`;
    }
  }
};

// ── HISTORY ───────────────────────────────────────────────────────
async function renderHistory() {
  const list  = document.getElementById("history-list");
  const stats = document.getElementById("history-stats");
  list.innerHTML = '<div class="history-loading"><div class="spinner"></div> Carregando registros...</div>';
  try {
    const snap = await getDocs(query(collection(db, COL), orderBy("salvo_em", "desc")));
    cachedHistory = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) {
    list.innerHTML = `<div class="history-empty">Erro ao carregar: ${e.message}</div>`; return;
  }
  if (cachedHistory.length > 0) {
    stats.style.display = "grid";
    const total    = cachedHistory.length;
    const gerentes = cachedHistory.filter(r => r.tipo === "gerente").length;
    const vendeds  = cachedHistory.filter(r => r.tipo === "vendedor").length;
    const media    = Math.round(cachedHistory.reduce((a,r) => a+(r.totalItens?r.done/r.totalItens*100:0),0)/total);
    document.getElementById("stat-total").textContent      = total;
    document.getElementById("stat-gerentes").textContent   = gerentes;
    document.getElementById("stat-vendedores").textContent = vendeds;
    document.getElementById("stat-media").textContent      = media + "%";
    document.getElementById("tab-hist-count").textContent  = total;
    document.getElementById("history-count-label").textContent = total + " registro" + (total!==1?"s":"") + " encontrado" + (total!==1?"s":"");
  } else {
    stats.style.display = "none";
    document.getElementById("tab-hist-count").textContent = "0";
    document.getElementById("history-count-label").textContent = "";
  }
  if (cachedHistory.length === 0) { list.innerHTML = '<div class="history-empty">Nenhum registro salvo ainda.</div>'; return; }
  list.innerHTML = cachedHistory.map(r => {
    const pct     = r.totalItens === 0 ? 0 : Math.round((r.done/r.totalItens)*100);
    const dataStr = r.data ? String(r.data) : "";
    const dataFmt = dataStr ? new Date(dataStr + "T12:00:00").toLocaleDateString("pt-BR") : "—";
    const ok      = pct === 100;
    const continueBtn = !ok
      ? `<button class="btn-continue" onclick="event.stopPropagation();continueRecord('${r.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>Continuar</button>`
      : `<span style="font-size:10px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>Completo</span>`;
    return `<div class="history-card" onclick="openModal('${r.id}')">
      <span class="history-badge badge-${r.tipo}">${r.tipo}</span>
      <div class="history-info">
        <div class="history-name">${r.nome}</div>
        <div class="history-meta">${dataFmt}${r.motivo?" · "+r.motivo:""}${r.responsavel?" · "+r.responsavel:""}</div>
      </div>
      <div class="history-right">
        <div class="history-progress-bar-wrap">
          <div class="history-progress-mini"><div class="history-progress-mini-fill ${ok?"fill-ok":"fill-partial"}" style="width:${pct}%"></div></div>
          <div class="history-pct-sub">${r.done}/${r.totalItens} itens</div>
        </div>
        <div class="history-pct ${ok?"pct-ok":"pct-partial"}">${pct}%</div>
        ${continueBtn}
        <button class="btn-delete-record" title="Excluir registro" onclick="event.stopPropagation();deleteRecord('${r.id}','${r.nome.replace(/'/g,"\\'")}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join("");
}

window.clearHistory = async function() {
  if (!confirm("Apagar TODOS os registros do Firebase? Não pode ser desfeito.")) return;
  try {
    const snap = await getDocs(collection(db, COL));
    await Promise.all(snap.docs.map(d => deleteDoc(doc(db, COL, d.id))));
    audit("LIMPAR HISTÓRICO", "Todos os registros foram apagados");
    cachedHistory = []; renderHistory(); showToast("Histórico apagado.", "success");
  } catch(e) { showToast("Erro: " + e.message, "error"); }
};

// ── MODAL ─────────────────────────────────────────────────────────
window.openModal = function(id) {
  const r = cachedHistory.find(x => x.id === id); if (!r) return;
  const dataStr = r.data ? String(r.data) : "";
  const dataFmt = dataStr ? new Date(dataStr + "T12:00:00").toLocaleDateString("pt-BR") : "—";
  const pct = r.totalItens === 0 ? 0 : Math.round((r.done/r.totalItens)*100);
  document.getElementById("modal-title").textContent = r.nome;
  const itemsHtml = (ACESSOS[r.tipo]||[]).map(({ secao, itens }) => `
    <div class="modal-section-title">${secao}</div>
    ${itens.map(item => `<div class="modal-item">
      <span class="dot ${r.itens[item]?"dot-ok":"dot-no"}"></span>
      <span style="color:${r.itens[item]?"var(--text)":"var(--text3)"};${r.itens[item]?"":"text-decoration:line-through"}">${item}</span>
    </div>`).join("")}`).join("");
  document.getElementById("modal-body").innerHTML = `
    <div class="modal-meta-grid">
      <div class="modal-meta-item"><label>Tipo</label><span style="text-transform:capitalize">${r.tipo}</span></div>
      <div class="modal-meta-item"><label>Data</label><span>${dataFmt}</span></div>
      <div class="modal-meta-item"><label>Preenchido por</label><span>${r.responsavel||"—"}</span></div>
      <div class="modal-meta-item"><label>Motivo</label><span>${r.motivo||"—"}</span></div>
      <div class="modal-meta-item" style="grid-column:span 2"><label>Conclusão</label>
        <span style="color:${pct===100?"var(--green)":"var(--amber)"};font-weight:700;font-size:15px">${pct}%
          <small style="font-size:11px;font-weight:400;color:var(--text3)"> (${r.done} de ${r.totalItens} itens)</small>
        </span>
      </div>
      ${r.obs?`<div class="modal-meta-item" style="grid-column:span 2"><label>Observações</label><span>${r.obs}</span></div>`:""}
      ${r.salvo_por?`<div class="modal-meta-item" style="grid-column:span 2"><label>Salvo por</label><span>${r.salvo_por}</span></div>`:""}
    </div>${itemsHtml}`;
  document.getElementById("modal-actions").innerHTML = `
    <button class="btn-audit" onclick="openAuditModal('${r.id}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Ver histórico de edições
    </button>
    <button class="btn-modal-image" onclick="generateImage('${r.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Gerar imagem
    </button>`;
  document.getElementById("modal-overlay").classList.remove("hidden");
};

window.closeModal = function() { document.getElementById("modal-overlay").classList.add("hidden"); };

// ── EDIÇÃO DE REGISTRO ────────────────────────────────────────────
let editingRecordId = null;

window.continueRecord = function(id) {
  const r = cachedHistory.find(x => x.id === id); if (!r) return;
  editingRecordId = id;
  currentType = r.tipo;
  document.getElementById("btn-gerente").classList.toggle("active", r.tipo === "gerente");
  document.getElementById("btn-vendedor").classList.toggle("active", r.tipo === "vendedor");
  checkedItems = {};
  (ACESSOS[r.tipo]||[]).forEach(({ itens }) => {
    itens.forEach(item => { checkedItems[r.tipo + "__" + item] = !!r.itens[item]; });
  });
  document.getElementById("nome").value   = r.nome || "";
  document.getElementById("data").value   = r.data ? String(r.data).slice(0,10) : new Date().toISOString().split("T")[0];
  document.getElementById("motivo").value = r.motivo || "";
  document.getElementById("obs").value    = r.obs || "";
  const respSel = document.getElementById("responsavel");
  const vals = Array.from(respSel.options).map(o => o.value);
  respSel.value = vals.includes(r.responsavel) ? r.responsavel : "";
  renderChecklist(); updateProgress();
  // Mostra banner de edição e muda botão salvar
  const banner = document.getElementById("editing-banner");
  document.getElementById("editing-banner-name").textContent = r.nome;
  banner.classList.add("show");
  const btnSave = document.getElementById("btn-save");
  btnSave.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Salvar alterações`;
  btnSave.style.background = "var(--amber)";
  window.switchTab("form");
  showToast(`Editando registro de ${r.nome} ✓`, "success");
};

window.cancelEdit = function() {
  editingRecordId = null;
  document.getElementById("editing-banner").classList.remove("show");
  const btnSave = document.getElementById("btn-save");
  btnSave.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Salvar registro`;
  btnSave.style.background = "";
  window.clearForm();
};

// ── DELETE REGISTRO ───────────────────────────────────────────────
window.deleteRecord = async function(id, nome) {
  if (!confirm(`Excluir o registro de "${nome}"?\nEsta ação não pode ser desfeita.`)) return;
  try {
    await deleteDoc(doc(db, COL, id));
    audit("EXCLUIR", `Registro de ${nome} excluído por ${currentUser?.displayName}`);
    cachedHistory = cachedHistory.filter(x => x.id !== id);
    renderHistory();
    showToast(`Registro de ${nome} excluído.`, "success");
  } catch(e) { showToast("Erro ao excluir: " + e.message, "error"); }
};

// ── AUDITORIA DO REGISTRO ─────────────────────────────────────────
window.openAuditModal = async function(recordId) {
  const r = cachedHistory.find(x => x.id === recordId); if (!r) return;
  // Busca logs de auditoria deste registro
  const auditSnap = await getDocs(query(collection(db, COL_AUDIT), orderBy("data_hora", "desc")));
  const logs = auditSnap.docs.map(d => d.data()).filter(l =>
    l.detalhe && (l.detalhe.includes(r.nome) || l.registro_id === recordId)
  );
  const logsHtml = logs.length === 0
    ? `<div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center">Nenhum log encontrado para este registro.</div>`
    : logs.map(l => {
        const dt = new Date(l.data_hora);
        const dtFmt = dt.toLocaleDateString("pt-BR") + " " + dt.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
        return `<div class="audit-entry">
          <div class="audit-dot"></div>
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
              <span class="audit-user">${l.usuario||"—"}</span>
              <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:var(--accent-lt);color:var(--accent2)">${l.acao}</span>
              <span class="audit-time">${dtFmt}</span>
            </div>
            <div class="audit-detail">${l.detalhe||""}</div>
          </div>
        </div>`;
      }).join("");
  // Reutiliza o modal existente
  document.getElementById("modal-title").textContent = `Histórico de edições — ${r.nome}`;
  document.getElementById("modal-body").innerHTML = `
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px">${logs.length} evento${logs.length!==1?"s":""} registrado${logs.length!==1?"s":""}</div>
    ${logsHtml}`;
  document.getElementById("modal-actions").innerHTML = `
    <button class="btn-modal-image" onclick="openModal('${recordId}')">
      ← Voltar ao registro
    </button>`;
};

// ── GERAR IMAGEM ──────────────────────────────────────────────────
function buildPrintFrame(r) {
  const pct = r.totalItens===0 ? 0 : Math.round((r.done/r.totalItens)*100);
  const dataStr = r.data ? String(r.data) : "";
  const dataFmt = dataStr ? new Date(dataStr+"T12:00:00").toLocaleDateString("pt-BR") : "—";
  const barColor = pct===100 ? "#1e7a4a" : "#c47a1a";
  const sectionsHtml = (ACESSOS[r.tipo]||[]).map(({ secao, itens }) => `
    <div>
      <div class="pf-section-title">${secao}</div>
      ${itens.map(item => `<div class="pf-item">
        <div class="pf-dot" style="background:${r.itens[item]?"#1e7a4a":"#9a9890"}"></div>
        <span style="color:${r.itens[item]?"#1a1916":"#9a9890"};${r.itens[item]?"":"text-decoration:line-through"}">${item}</span>
      </div>`).join("")}
    </div>`).join("");
  const obsHtml = r.obs ? `<div class="pf-obs"><strong>⚠ Observações</strong>${r.obs}</div>` : "";
  return `
    <div class="pf-header">
      <div class="pf-logo">
        
        <div class="pf-brand" style="color:#0078c8">Porto Vale<small>Gestão de Acessos</small></div>
      </div>
      <div class="pf-doc-info">
        <div class="pf-doc-title">Checklist de ${r.tipo.charAt(0).toUpperCase()+r.tipo.slice(1)}</div>
        <div class="pf-doc-date">Emitido em ${new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"})}</div>
      </div>
    </div>
    <div class="pf-meta-grid">
      <div class="pf-meta-item"><label>Colaborador</label><span>${r.nome}</span></div>
      <div class="pf-meta-item"><label>Preenchido por</label><span>${r.responsavel||"—"}</span></div>
      <div class="pf-meta-item"><label>Data</label><span>${dataFmt}</span></div>
      <div class="pf-meta-item"><label>Motivo</label><span>${r.motivo||"—"}</span></div>
    </div>
    <div class="pf-progress-row">
      <div class="pf-progress-bar"><div class="pf-progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="pf-progress-txt" style="color:${barColor}">${pct}% concluído &nbsp;<span style="color:#9a9890;font-size:11px;font-weight:400">(${r.done} de ${r.totalItens} itens)</span></div>
    </div>
    <div class="pf-sections-grid">${sectionsHtml}</div>
    ${obsHtml}
    <div class="pf-footer">
      <span>Porto Vale · Checklist de Acessos · Salvo por: ${r.salvo_por||"—"}</span>
      <span class="pf-status-badge ${pct===100?"pf-ok":"pf-partial"}">${pct===100?"✓ Completo":"⚠ Incompleto"}</span>
    </div>`;
}

window.generateImage = async function(recordId) {
  let r;
  if (recordId !== null) {
    r = cachedHistory.find(x => x.id === recordId);
  } else {
    const nome = document.getElementById("nome").value.trim();
    if (!nome) { showToast("Preencha pelo menos o nome do colaborador.", "error"); return; }
    const total = ACESSOS[currentType].reduce((a,s) => a+s.itens.length, 0);
    const done  = Object.values(checkedItems).filter(Boolean).length;
    const itens = {};
    ACESSOS[currentType].forEach(({ itens: its }) => {
      its.forEach(item => { itens[item] = !!checkedItems[currentType+"__"+item]; });
    });
    r = { tipo:currentType, nome, responsavel:document.getElementById("responsavel").value,
          data:document.getElementById("data").value, motivo:document.getElementById("motivo").value,
          obs:document.getElementById("obs").value.trim(), totalItens:total, done, itens,
          salvo_por: currentUser ? currentUser.displayName : "—" };
  }
  if (!r) return;
  const frame = document.getElementById("print-frame");
  frame.innerHTML = buildPrintFrame(r);
  showToast("Gerando imagem...");
  await new Promise(res => setTimeout(res, 120));
  try {
    const canvas = await html2canvas(frame, { scale:2, useCORS:true, backgroundColor:"#ffffff" });
    const link = document.createElement("a");
    const safeName = r.nome.replace(/[^a-z0-9]/gi,"_").toLowerCase();
    link.download = `checklist_${r.tipo}_${safeName}_${r.data||"sem-data"}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    audit("GERAR IMAGEM", `Imagem gerada para ${r.nome}`);
    showToast("Imagem salva ✓", "success");
  } catch(e) { showToast("Erro ao gerar imagem: " + e.message, "error"); }
  frame.innerHTML = "";
};

// ── EXPORT XLSX ───────────────────────────────────────────────────
window.exportXLSX = function() {
  if (cachedHistory.length === 0) { showToast("Nenhum registro para exportar.", "error"); return; }
  const wb = XLSX.utils.book_new();
  const allItems    = [...ACESSOS.gerente.flatMap(s=>s.itens), ...ACESSOS.vendedor.flatMap(s=>s.itens)];
  const uniqueItems = [...new Set(allItems)];
  const headers = ["Tipo","Colaborador","Preenchido por","Data","Motivo","Observações","% Concluído","Itens OK","Total Itens","Salvo por","Salvo em",...uniqueItems];
  const rows = cachedHistory.map(r => {
    const dataStr = r.data ? String(r.data) : "";
    const dataFmt = dataStr ? new Date(dataStr+"T12:00:00").toLocaleDateString("pt-BR") : "";
    const pct = r.totalItens===0 ? 0 : Math.round((r.done/r.totalItens)*100);
    return [
      r.tipo.charAt(0).toUpperCase()+r.tipo.slice(1), r.nome, r.responsavel||"", dataFmt,
      r.motivo||"", r.obs||"", pct/100, r.done, r.totalItens, r.salvo_por||"", r.salvo_em||"",
      ...uniqueItems.map(item => r.itens[item]===undefined?"N/A":r.itens[item]?"✓":"✗")
    ];
  });
  const ws = XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws["!cols"] = [{wch:12},{wch:24},{wch:22},{wch:12},{wch:16},{wch:30},{wch:13},{wch:10},{wch:11},{wch:20},{wch:20},...uniqueItems.map(()=>({wch:22}))];
  ws["!freeze"] = { xSplit:0, ySplit:1 };
  rows.forEach((_,i) => { const c = XLSX.utils.encode_cell({r:i+1,c:6}); if(ws[c]) ws[c].z="0%"; });
  XLSX.utils.book_append_sheet(wb, ws, "Registros");
  const total    = cachedHistory.length;
  const gerentes = cachedHistory.filter(r=>r.tipo==="gerente").length;
  const vendeds  = cachedHistory.filter(r=>r.tipo==="vendedor").length;
  const compls   = cachedHistory.filter(r=>r.totalItens&&r.done===r.totalItens).length;
  const media    = total ? Math.round(cachedHistory.reduce((a,r)=>a+(r.totalItens?r.done/r.totalItens*100:0),0)/total) : 0;
  const wsSumm = XLSX.utils.aoa_to_sheet([
    ["RELATÓRIO — PORTO VALE",""],["Checklist de Acessos",""],["",""],
    ["TOTAIS",""],["Total de registros",total],["Gerentes",gerentes],["Vendedores",vendeds],["",""],
    ["CONCLUSÃO",""],["Média de conclusão",media/100],["100% completos",compls],["Incompletos",total-compls],["",""],
    ["GERADO EM",""],["Data/Hora",new Date().toLocaleString("pt-BR")],
    ["Usuário",currentUser?currentUser.displayName:"Sistema"]
  ]);
  wsSumm["!cols"] = [{wch:32},{wch:18}];
  if (wsSumm["B10"]) wsSumm["B10"].z = "0%";
  XLSX.utils.book_append_sheet(wb, wsSumm, "Resumo");
  ["gerente","vendedor"].forEach(tipo => {
    const recs = cachedHistory.filter(r=>r.tipo===tipo);
    if (!recs.length) return;
    const its  = ACESSOS[tipo].flatMap(s=>s.itens);
    const hdr  = ["Colaborador","Preenchido por","Data","Motivo","% Concluído",...its];
    const rws  = recs.map(r => {
      const dataStr = r.data?String(r.data):"";
      const dataFmt = dataStr?new Date(dataStr+"T12:00:00").toLocaleDateString("pt-BR"):"";
      const pct = r.totalItens===0?0:Math.round((r.done/r.totalItens)*100);
      return [r.nome,r.responsavel||"",dataFmt,r.motivo||"",pct/100,...its.map(i=>r.itens[i]===undefined?"N/A":r.itens[i]?"✓":"✗")];
    });
    const ws2 = XLSX.utils.aoa_to_sheet([hdr,...rws]);
    ws2["!cols"] = [{wch:24},{wch:22},{wch:12},{wch:16},{wch:13},...its.map(()=>({wch:22}))];
    ws2["!freeze"] = {xSplit:0,ySplit:1};
    rws.forEach((_,i)=>{ const c=XLSX.utils.encode_cell({r:i+1,c:4}); if(ws2[c]) ws2[c].z="0%"; });
    XLSX.utils.book_append_sheet(wb, ws2, tipo.charAt(0).toUpperCase()+tipo.slice(1)+"s");
  });
  const stamp = new Date().toISOString().slice(0,10).replace(/-/g,"");
  XLSX.writeFile(wb, `checklist_acessos_${stamp}.xlsx`);
  audit("EXPORTAR XLSX", `Exportação realizada com ${cachedHistory.length} registros`);
  showToast("Exportado com sucesso ✓", "success");
};

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast"+(type?" "+type:"");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add("hidden"), 3200);
}
</script>
